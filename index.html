<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | SYSTEM BREACH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanlines"></div>
    <div class="terminal-container">
        <div id="output" class="terminal-output">
            <div class="line">SYSTEM INITIALIZED...</div>
            <div class="line">WELCOME, AGENT. TYPE 'HELP' FOR COMMANDS.</div>
            <div class="line">&nbsp;</div>
        </div>
        <div class="input-line">
            <span class="prompt">root@system:~#</span>
            <input type="text" id="commandInput" autofocus spellcheck="false" autocomplete="off">
            <span class="cursor"></span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
